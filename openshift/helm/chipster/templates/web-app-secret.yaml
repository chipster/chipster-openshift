---
apiVersion: v1
kind: Secret
metadata:
  name: web-server-app
  labels:
    app: chipster
type: Opaque
stringData:
  chipster.yaml: |-
    service-locator: http://service-locator-{{ $.Values.project }}.{{ $.Values.domain }}
    
    {{- include "chipster.listDeploymentConfigs" $.Values.app | indent 4 }}
