variables:
  # db
  POSTGRES_PASSWORD: chipster
  # psql
  PGPASSWORD: chipster
  POSTGRES_USER: user

ci-test:
  image: image-registry.apps.2.rahti.csc.fi/chipster-images-dev/ci-test:$CI_COMMIT_BRANCH
  services:
    - postgres:14
  before_script:
    # create databases
    - createdb -h postgres -U user auth_db
    - createdb -h postgres -U user session_db_db
    - createdb -h postgres -U user job_history_db
    # compile
    - pushd /home/user/chipster-web-server
    - ./gradlew distTar
    # extract jar files
    - mkdir lib; cd lib; tar -xf ../build/distributions/chipster-web-server.tar.gz
    - mkdir conf
    - |
      echo "db_pass_auth: chipster
      db_url_auth: jdbc:postgresql://postgres:5432/auth_db
      db_pass_session_db: chipster
      db_url_session_db: jdbc:postgresql://postgres:5432/session_db_db
      db_pass_job_history: chipster
      db_url_job_history: jdbc:postgresql://postgres:5432/job_history_db" >> conf/chipster.yaml

    # start Chipster backend
    # write ServerLauncher output to file, because type-service dies if it tries to write to a log after losing the stdout
    # ´&´ runs ServerLauncher in the background
    # 'tail +1f' follows the file starting from the line 1, until sed quits it
    - "java -cp lib/chipster-web-server/lib/*: fi.csc.chipster.rest.ServerLauncher > stdout.log & tail +1f stdout.log | sed '/INFO: press Ctrl + C to stop/q' || true"
    # run tests
    # store exit_status of the junit tests, copy results in any case, and then exit this job with the original status
    # - exit_status=0
  script:
    - ./gradlew test
    # - ./gradlew test || exit_status=$?
  after_script:
    # go back to job directory
    # - popd
    # move test results
    - mv /home/user/chipster-web-server/build/test-results/test .

    - exit "$exit_status"

  stage: test
  artifacts:
    when: always
    # paths:
    #   - "test/TEST-*.xml"
    reports:
      junit: "test/TEST-*.xml"
  tags:
    # run in docker executor to be able to start DB easily
    - docker
