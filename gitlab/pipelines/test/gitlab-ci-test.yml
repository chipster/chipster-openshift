variables:
  # db
  POSTGRES_PASSWORD: chipster
  # psql
  PGPASSWORD: chipster
  POSTGRES_USER: user

ci-test:
  image: image-registry.apps.2.rahti.csc.fi/chipster-images-dev/ci-test:$CI_COMMIT_BRANCH
  services:
    - postgres:14
  before_script:
    # create databases
    - createdb -h postgres -U user auth_db
    - createdb -h postgres -U user session_db_db
    - createdb -h postgres -U user job_history_db
    # compile
    - cd /home/user/chipster-web-server
    - ./gradlew distTar
    # extract jar files
    - mkdir lib; pushd lib; tar -xf ../build/distributions/chipster-web-server.tar.gz; popd
    # write configuration
    - |
      echo "db-pass-auth: chipster
      db-url-auth: jdbc:postgresql://postgres:5432/auth_db
      db-pass-session-db: chipster
      db-url-session-db: jdbc:postgresql://postgres:5432/session_db_db
      db-pass-job-history: chipster
      db-url-job-history: jdbc:postgresql://postgres:5432/job_history_db" >> conf/chipster.yaml

    # start Chipster backend
    # write ServerLauncher output to file, because type-service dies if it tries to write to a log after losing the stdout
    # ´&´ runs ServerLauncher in the background
    # 'tail +1f' follows the file starting from the line 1, until sed quits it
    - "java -cp lib/chipster-web-server/lib/*: fi.csc.chipster.rest.ServerLauncher > stdout.log & tail +1f stdout.log | sed '/INFO: press Ctrl + C to stop/q' || true"
  script:
    - echo CI_PIPELINE_CREATED_AT: $CI_PIPELINE_CREATED_AT
    # run tests
    # the same shell context with before_script
    - ./gradlew test
  after_script:
    # working directory is back in $CI_PROJECT_DIR, because GitLab creates a new shell context for after_script
    # GitLab accepts test results only under $CI_PROJECT_DIR
    - mv /home/user/chipster-web-server/build/test-results/test .

  stage: test
  artifacts:
    when: always
    reports:
      junit: "test/TEST-*.xml"
  tags:
    # run in docker executor to be able to start DB easily
    - docker
