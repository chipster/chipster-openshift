db_name:
  artifacts:
    reports:
      dotenv: build.env
  script:
    - echo CONTAINER_NAME=chipster-ci_$(echo $CI_PIPELINE_CREATED_AT | tr ':' '-') >> build.env
    - echo DB_NAME=postgres_$(echo $CI_PIPELINE_CREATED_AT | tr ':' '-') >> build.env
  stage: test

ci-test:
  needs:
    - db_name
  script:
    - sudo docker run --detach -e POSTGRES_PASSWORD=chipster -e POSTGRES_USER=user --name $DB_NAME postgres:14
    # start container first to keep the length of these commands manageable
    - "sudo docker run --detach --link $DB_NAME --name $CONTAINER_NAME
      -e db_pass_auth=chipster -e db_url_auth=jdbc:postgresql://$DB_NAME:5432/auth_db
      -e db_pass_session_db=chipster -e db_url_session_db=jdbc:postgresql://$DB_NAME:5432/session_db_db
      -e db_pass_job_history=chipster -e db_url_job_history=jdbc:postgresql://$DB_NAME:5432/job_history_db
      image-registry.apps.2.rahti.csc.fi/chipster-images-dev/ci-test:$CI_COMMIT_BRANCH
      sleep inf"
    - sudo docker exec $CONTAINER_NAME ./gradlew distTar
    - sudo docker exec $CONTAINER_NAME bash -c 'mkdir lib; cd lib; tar -xf ../build/distributions/chipster-web-server.tar.gz'
    #- "sleep 10" # wait for DB to start
    - sudo docker run -e PGPASSWORD=chipster --link $DB_NAME postgres:14 createdb -h $DB_NAME -U user auth_db
    - sudo docker run -e PGPASSWORD=chipster --link $DB_NAME postgres:14 createdb -h $DB_NAME -U user session_db_db
    - sudo docker run -e PGPASSWORD=chipster --link $DB_NAME postgres:14 createdb -h $DB_NAME -U user job_history_db
    # we could just --detach, but then we don't see the output
    - "sudo docker exec $CONTAINER_NAME bash -c 'java -cp lib/chipster-web-server/lib/*: fi.csc.chipster.rest.ServerLauncher & sleep 50'"
    - sudo docker exec $CONTAINER_NAME ./gradlew test
      # "sudo docker stop " + pg_name,
      # "sudo docker rm " + pg_name,
  stage: test
