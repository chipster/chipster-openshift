db_name:
  artifacts:
    reports:
      dotenv: build.env
  script:
    - echo CONTAINER_NAME=chipster-ci_$(echo $CI_PIPELINE_CREATED_AT | tr ':' '-') >> build.env
    - echo DB_NAME=postgres_$(echo $CI_PIPELINE_CREATED_AT | tr ':' '-') >> build.env
  stage: test
  tags:
    - docker

variables:
  # db
  POSTGRES_PASSWORD: chipster
  # psql
  PGPASSWORD: chipster
  POSTGRES_USER: user

ci-test:
  image: image-registry.apps.2.rahti.csc.fi/chipster-images-dev/ci-test:$CI_COMMIT_BRANCH
  needs:
    - db_name
  services:
    - postgres:14
  script:
    - image="image-registry.apps.2.rahti.csc.fi/chipster-images-dev/ci-test:$CI_COMMIT_BRANCH"
    # type-service dies if it tries to write log to missing stdout. Is tee enough?
    - pushd /home/user/chipster-web-server
    - "db_pass_auth=chipster db_url_auth=jdbc:postgresql://postgres:5432/auth_db
      db_pass_session_db=chipster db_url_session_db=jdbc:postgresql://postgres:5432/session_db_db
      db_pass_job_history=chipster db_url_job_history=jdbc:postgresql://postgres:5432/job_history_db
      java -cp lib/chipster-web-server/lib/*: fi.csc.chipster.rest.ServerLauncher | tee stdout.log 2>&1 & sleep 50"
    - ./gradlew distTar
    - bash -c 'mkdir lib; cd lib; tar -xf ../build/distributions/chipster-web-server.tar.gz'
    - createdb -h postgres -U user auth_db
    - createdb -h postgres -U user session_db_db
    - createdb -h postgres -U user job_history_db
    - ./gradlew test
    - popd
    - mv /home/user/chipster-web-server/build/test-results/test .
    - pwd
    - ls -lah
    - ls -lah test || true
    # store exit_status of the junit tests, copy results in any case, and then exit this job with the original status
    # - exit_status=0
    # - ./gradlew test || exit_status=$?
    #- docker cp $CONTAINER_NAME:/home/user/chipster-web-server/build/test-results/test test-results
    # - chown -R gitlab-runner:gitlab-runner test-results
    # - docker stop $DB_NAME
    # - docker rm $DB_NAME
    # - docker stop $CONTAINER_NAME
    # - docker rm $CONTAINER_NAME
    # - docker image rm $image
    # - exit "$exit_status"

  stage: test
  artifacts:
    when: always
    paths:
      - "test/TEST-*.xml"
    reports:
      junit: "test/TEST-*.xml"
  tags:
    - docker
