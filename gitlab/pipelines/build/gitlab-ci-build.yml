# Chipster CI/CD configuration
#
# Do not edit this file! Make changes in BuildConfigs under kustomize/builds and run
#
# cd generate-gitlab-ci
# python3 -m venv venv
# source venv/bin/activate
# pip3 install -r requirements.txt
# ./generate-gitlab-ci.py
#

build-base:
  needs: []
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-16-04:
  needs: []
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-16-04 $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-ci-test:
  needs:
    - build-base-java-utils
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-ci-test $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-java:
  needs:
    - build-base
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-java $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-java-16-04:
  needs:
    - build-base-16-04
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-java-16-04 $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-java-comp:
  needs:
    - build-base-java-16-04
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-java-comp $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-java-utils:
  needs:
    - build-base-java
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-java-utils $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-base-node:
  needs:
    - build-base
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash base-node $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-tools:
  needs:
    - build-base
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash chipster-tools $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web:
  needs:
    - build-base-node
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash chipster-web $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web-server:
  needs:
    - build-base-java-utils
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash chipster-web-server $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web-server-build:
  needs:
    - build-chipster-web-server
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash chipster-web-server-build $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web-server-js:
  needs:
    - build-chipster-web-server
    - build-base-node
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash chipster-web-server-js $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-ci-test:
  needs:
    - build-chipster-tools
    - build-chipster-web-server
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash ci-test $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-cli-client:
  needs:
    - build-chipster-web-server
    - build-base-node
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash cli-client $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
