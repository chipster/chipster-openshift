build-toolbox:
  needs:
    - build-chipster-tools
    - build-chipster-web-server-build
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash toolbox $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-web-server:
  needs:
    - build-chipster-tools
    - build-chipster-web-server-build
    - build-chipster-web
  script:
    - cd gitlab/pipelines/build
    - bash build-image-ci.bash web-server $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
