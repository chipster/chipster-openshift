
# Chipster CI/CD configuration
# 
# Changes in this file will be overwritten! Make changes in BuildConfigs under kustomize/builds and run
# 
# cd generate-gitlab-ci
# python3 -m venv venv
# source venv/bin/activate
# pip3 install -r requirements.txt
# ./generate-gitlab-ci.py
# 

build-chipster-tools:
  needs: []
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash chipster-tools $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web:
  needs: []
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash chipster-web $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web-server:
  needs: []
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash chipster-web-server $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web-server-build:
  needs:
  - build-chipster-web-server
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash chipster-web-server-build $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-chipster-web-server-js:
  needs:
  - build-chipster-web-server
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash chipster-web-server-js $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-ci-test:
  needs:
  - build-chipster-tools
  - build-chipster-web-server
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash ci-test $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-cli-client:
  needs:
  - build-chipster-web-server
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash cli-client $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-grafana:
  needs: []
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash grafana $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-monitoring:
  needs: []
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash monitoring $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-toolbox:
  needs:
  - build-chipster-tools
  - build-chipster-web-server-build
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash toolbox $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
build-web-server:
  needs:
  - build-chipster-tools
  - build-chipster-web
  - build-chipster-web-server-build
  script:
  - cd gitlab/pipelines/build
  - bash build-image-ci.bash web-server $CI_PIPELINE_CREATED_AT $CI_COMMIT_BRANCH
  stage: build
