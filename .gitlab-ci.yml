
# Chipster CI/CD configuration
# 
# Do not edit this file! Make changes in BuildConfigs under kustomize/builds and run
# 
# cd gitlab/generate-gitlab-ci
# python3 -m venv venv
# source venv/bin/activate
# pip3 install -r requirements.txt
# ./generate-gitlab-ci.py
# 
build-base:
  needs: []
  script:
  - cd k3s
  - bash scripts/build-image.bash base
  stage: build
build-base-16-04:
  needs: []
  script:
  - cd k3s
  - bash scripts/build-image.bash base-16-04
  stage: build
build-base-java:
  needs:
  - build-base
  script:
  - cd k3s
  - bash scripts/build-image.bash base-java
  stage: build
build-base-java-16-04:
  needs:
  - build-base-16-04
  script:
  - cd k3s
  - bash scripts/build-image.bash base-java-16-04
  stage: build
build-base-java-comp:
  needs:
  - build-base-java-16-04
  script:
  - cd k3s
  - bash scripts/build-image.bash base-java-comp
  stage: build
build-base-java-utils:
  needs:
  - build-base-java
  script:
  - cd k3s
  - bash scripts/build-image.bash base-java-utils
  stage: build
build-base-node:
  needs:
  - build-base
  script:
  - cd k3s
  - bash scripts/build-image.bash base-node
  stage: build
build-chipster-tools:
  needs:
  - build-base
  script:
  - cd k3s
  - bash scripts/build-image.bash chipster-tools
  stage: build
build-chipster-web:
  needs:
  - build-base-node
  script:
  - cd k3s
  - bash scripts/build-image.bash chipster-web
  stage: build
build-chipster-web-server:
  needs:
  - build-base-java-utils
  script:
  - cd k3s
  - bash scripts/build-image.bash chipster-web-server
  stage: build
build-chipster-web-server-js:
  needs:
  - build-base-node
  script:
  - cd k3s
  - bash scripts/build-image.bash chipster-web-server-js
  stage: build
build-cli-client:
  needs:
  - build-base-node
  script:
  - cd k3s
  - bash scripts/build-image.bash cli-client
  stage: build
build-comp-16-04:
  needs:
  - build-base-java-comp
  - build-chipster-web-server
  script:
  - cd k3s
  - bash scripts/build-image.bash comp-16-04
  stage: build
