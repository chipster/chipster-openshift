ci-test:
  needs:
    - db_name
  script:
    - sudo docker run --detach -e POSTGRES_PASSWORD=chipster -e POSTGRES_USER=user --name
      $DB_NAME postgres:14
    - "sudo docker run -e PGPASSWORD=chipster --link $DB_NAME postgres:14 createdb -h
      $DB_NAME -U user auth_db "
    - "sudo docker run -e PGPASSWORD=chipster --link $DB_NAME postgres:14 createdb -h
      $DB_NAME -U user session_db_db "
    - "sudo docker run -e PGPASSWORD=chipster --link $DB_NAME postgres:14 createdb -h
      $DB_NAME -U user job_history_db "
    - "sudo docker run -e db_pass_auth=chipster -e db_url_auth=jdbc:postgresql://$DB_NAME:5432/auth_db  -e
      db_url_session_db=jdbc:postgresql://$DB_NAME:5432/session_db_db  -e db_url_job_history=jdbc:postgresql://$DB_NAME:5432/job_history_db  --link
      $DB_NAME image-registry.apps.2.rahti.csc.fi/chipster-images-dev/chipster-web-server
      java -cp lib/*: fi.csc.chipster.rest.ServerLauncher"
  stage: test
db_name:
  artifacts:
    reports:
      dotenv: build.env
  script:
    - echo DB_NAME=postgres_$(echo $CI_PIPELINE_CREATED_AT | tr ':' '-') >> build.env
  stage: test
stages:
  # - build
  - test
